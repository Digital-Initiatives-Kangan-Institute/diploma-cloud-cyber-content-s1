AWSTemplateFormatVersion: '2010-09-09'

Description: >-
  YAT audit-log — foundation data layer (DynamoDB audit table + SQS event queue +
  a queue-backlog alarm). This is a SUPPLIED template you OPERATE: deploy it, update a
  parameter, then delete it. (ICTCLD505 elements 1-2.) Deploy to the India-region
  stand-in: us-west-2.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Environment suffix used in resource names.

  AlarmBacklogThreshold:
    Type: Number
    Default: 100
    MinValue: 1
    Description: Queue-depth backlog that trips the alarm (try updating this value).

Resources:
  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'yat-audit-${EnvName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      Tags:
        - { Key: Project, Value: YAT-LMS }
        - { Key: Environment, Value: !Ref EnvName }
        - { Key: DataClassification, Value: audit-log }

  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'yat-audit-${EnvName}'
      MessageRetentionPeriod: 86400
      VisibilityTimeout: 60

  BacklogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'yat-audit-backlog-${EnvName}'
      AlarmDescription: Audit queue backlog is high — the writer may be falling behind.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EventQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: !Ref AlarmBacklogThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  AuditTableName:
    Description: The DynamoDB audit table name.
    Value: !Ref AuditTable

  EventQueueUrl:
    Description: The SQS queue URL (where events are sent).
    Value: !Ref EventQueue

  EventQueueArn:
    Description: The SQS queue ARN (for the writer Lambda's event source mapping).
    Value: !GetAtt EventQueue.Arn
